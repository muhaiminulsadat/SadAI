version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    env_file:
      - ./frontend/.env
    depends_on:
      - gateway

  gateway:
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/gateway:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    env_file:
      - ./backend/gateway/.env
    depends_on:
      - auth-service
      - chat-service
      - agent-service

  auth-service:
    build:
      context: ./backend/services/auth
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./backend/services/auth:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    env_file:
      - ./backend/services/auth/.env

  chat-service:
    build:
      context: ./backend/services/chat
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./backend/services/chat:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    env_file:
      - ./backend/services/chat/.env

  agent-service:
    build:
      context: ./backend/services/agent
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./backend/services/agent:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - CHAT_SERVICE_URL=http://chat-service:8002
    env_file:
      - ./backend/services/agent/.env
