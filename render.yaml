services:
  # Frontend Static Site
  - type: web
    name: sadai-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_SERVICE_URL
        sync: false

  # Gateway Service
  - type: web
    name: sadai-gateway
    env: node
    rootDir: backend/gateway
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: FRONTEND_URL
        sync: false
      - key: AUTH_SERVICE_URL
        value: http://sadai-auth:8001
      - key: CHAT_SERVICE_URL
        value: http://sadai-chat:8002
      - key: AGENT_SERVICE_URL
        value: http://sadai-agent:8003

  # Auth Service
  - type: web
    name: sadai-auth
    env: node
    rootDir: backend/services/auth
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 8001
      - key: MONGODB_URI
        sync: false
      - key: BETTER_AUTH_SECRET
        generateValue: true

  # Chat Service
  - type: web
    name: sadai-chat
    env: node
    rootDir: backend/services/chat
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 8002
      - key: MONGODB_URI
        sync: false

  # Agent Service
  - type: web
    name: sadai-agent
    env: node
    rootDir: backend/services/agent
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 8003
      - key: MONGODB_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: CHAT_SERVICE_URL
        value: http://sadai-chat:8002
