version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    depends_on:
      - gateway

  gateway:
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/gateway/.env
    depends_on:
      - auth-service
      - chat-service
      - agent-service

  auth-service:
    build:
      context: ./backend/services/auth
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ./backend/services/auth/.env

  chat-service:
    build:
      context: ./backend/services/chat
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    env_file:
      - ./backend/services/chat/.env

  agent-service:
    build:
      context: ./backend/services/agent
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    env_file:
      - ./backend/services/agent/.env
